include matugen-theme.conf
# This is the configuration file for kitty terminal
# For more information, see https://sw.kovidgoyal.net/kitty/conf.html
# For your custom configurations, put it in ./kitty.conf
font_family IosevkaTerm Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto
enable_audio_bell no
font_size 12.0
window_padding_width 5
cursor_trail 1

# Theme provided by Omarchy via include at top of file
background_opacity 0.40
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}
hide_window_decorations yes
#confirm_os_window_close 0

tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}
