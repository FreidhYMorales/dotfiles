# Template de colores para Hyprland — formato de Caelestia
# Se regenera automáticamente al cambiar tema/wallpaper.
# Source este archivo desde hyprland.conf:
#   source = ~/.config/hypr/scheme/current.conf
#
# Los {{ $nombre }} son reemplazados por hex values sin # por apply_colours().
# En matugen el formato es diferente — ver su documentación de templates.

$primary = {{ $primary }}
$onPrimary = {{ $onPrimary }}
$primaryContainer = {{ $primaryContainer }}
$onPrimaryContainer = {{ $onPrimaryContainer }}
$secondary = {{ $secondary }}
$onSecondary = {{ $onSecondary }}
$secondaryContainer = {{ $secondaryContainer }}
$onSecondaryContainer = {{ $onSecondaryContainer }}
$tertiary = {{ $tertiary }}
$surface = {{ $surface }}
$onSurface = {{ $onSurface }}
$surfaceContainer = {{ $surfaceContainer }}
$surfaceContainerHigh = {{ $surfaceContainerHigh }}
$error = {{ $error }}
$outline = {{ $outline }}
