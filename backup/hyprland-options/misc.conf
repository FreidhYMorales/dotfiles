# Hyprland misc options — extraídas de Caelestia
# Integrar en ~/.config/hypr/hyprland.conf o en un archivo sourced

misc {
    # Desactiva el paste con botón del medio (herencia molesta de X11)
    middle_click_paste = false

    # Al bloquear pantalla muestra el escritorio desenfocado en lugar de negro
    session_lock_xray = true

    # Permite restaurar la sesión si el lock screen crashea
    allow_session_lock_restore = true

    # Qué pasa cuando una ventana pide foco bajo una fullscreen
    # 0 = ignorar, 1 = flash, 2 = enfocar si es del mismo workspace
    on_focus_under_fullscreen = 2

    # Activa VRR (Variable Refresh Rate) si el monitor lo soporta
    # 0 = off, 1 = full, 2 = solo en fullscreen
    vrr = 1

    # Wakeup de pantalla con mouse o teclado
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}
