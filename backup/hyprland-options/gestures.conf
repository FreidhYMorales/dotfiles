# Hyprland touchpad gestures — extraídas de Caelestia
# Requiere Hyprland >= 0.41 (directiva `gesture =`)
# Integrar en ~/.config/hypr/hyprland.conf o en un archivo sourced

gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.15
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

# Ajustar los números de dedos según preferencia
# gesture = <fingers> <direction> <action> [args...]

# 4 dedos horizontal → cambiar workspace
gesture = 4, horizontal, workspace

# 3 dedos arriba → abrir special workspace
gesture = 3, up, special, special

# 3 dedos abajo → cerrar special workspace visible
# gesture = 3, down, dispatcher, exec, <tu-comando-toggle-specialws>

# 4 dedos abajo → suspend
gesture = 4, down, dispatcher, exec, systemctl suspend-then-hibernate
