# Autostart útiles — extraídos de Caelestia
# Integrar en ~/.config/hypr/hyprland.conf (sección exec-once)

# Historial de clipboard (texto + imágenes por separado)
# Requiere: cliphist, wl-clipboard
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Limpieza automática de papelera (elementos > 30 días)
# Requiere: trash-cli (pacman -S trash-cli)
exec-once = trash-empty 30

# Reenvía comandos de media Bluetooth al reproductor MPRIS del sistema
# Sin esto los controles de auriculares BT no controlan mpd/spotify/etc.
# Requiere: bluez-utils (ya en Omarchy)
exec-once = mpris-proxy

# Night light automático por ubicación GPS (alternativa a hyprsunset manual)
# Requiere: geoclue, gammastep (yay -S geoclue gammastep)
# exec-once = /usr/lib/geoclue-2.0/demos/agent
# exec-once = sleep 1 && gammastep
