# Extra autostart processes
# exec-once = uwsm-app -- my-service

exec-once = gnome-keyring-daemon --start --components=secrets

# Fix XWayland DPI: without this, X11 apps (like MySQL Workbench) read the
# physical monitor DPI (~144) and render UI at 1.5x standard size.
# 96 = standard DPI reference. Use 115 (~96×1.2) to match Wayland scale.
exec-once = DISPLAY=:0 xrandr --dpi 96

exec-once = /usr/lib/xdg-desktop-portal-termfilechooser
