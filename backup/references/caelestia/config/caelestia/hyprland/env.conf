# ####### NVIDIA screencopy fix #######
# Forces linear DMA-buf (no proprietary NVIDIA block-linear modifiers).
# Required for pipewiresrc/xdg-portal screencopy to work under NVIDIA+Hyprland.
env = AQ_NO_MODIFIERS, 1

# ####### ICONS fix#######
# Forces icon theme via variable.
env = QS_ICON_THEME, Papirus-Dark
