source =  $monitor
source = ./hyprland/animation.conf
source = ./hyprland/env.conf
source = ./hyprland/input.conf
source = ./hyprland/decoration.conf
source = ./hyprland/keybinds.conf
source = ./hyprland/nvidia.conf
source = ./hyprland/rule.conf

exec-once = /usr/lib/xdg-desktop-portal-termfilechooser

# Forzar uso del XDG portal para selectores de archivos
env = GTK_USE_PORTAL, 1
env = QT_QPA_PLATFORMTHEME, xdgdesktopportal

# WinApps: libvirt system URI para que virsh encuentre la VM desde cualquier contexto
env = LIBVIRT_DEFAULT_URI, qemu:///system

# XWayland: renderizar en resolución nativa para evitar pixelación (ej. Steam)
xwayland {
    force_zero_scaling = true
}

# Iniciar el daemon de secretos de GNOME
exec-once = hyprctl output create headless
monitor = HEADLESS-1, 1920x1080@60, 1600x0, 1

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/kdeconnectd
exec-once = kdeconnect-indicator
