source =  $monitor
source = ./hyprland/animation.conf
source = ./hyprland/input.conf
source = ./hyprland/decoration.conf
source = ./hyprland/keybinds.conf
source = ./hyprland/nvidia.conf
source = ./hyprland/rules.conf

exec-once = /usr/lib/xdg-desktop-portal-termfilechooser

# Forzar uso del XDG portal para selectores de archivos
env = GTK_USE_PORTAL, 1
env = QT_QPA_PLATFORMTHEME, xdgdesktopportal

# XWayland: renderizar en resolución nativa para evitar pixelación (ej. Steam)
xwayland {
    force_zero_scaling = true
}
